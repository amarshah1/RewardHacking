# Reward Hacking Experiment Configuration

# OpenRouter settings
openrouter:
  base_url: "https://openrouter.ai/api/v1"
  # Qwen3.5 9B - small model (OpenRouter for now, local for SFT training)
  model: "qwen/qwen3-coder" # "qwen/qwen3.5-9b"
  # For test generation, keep using the large OpenRouter model
  generator_model: "qwen/qwen3-coder"

# Branch toggles
branches:
  reward_hack_a1: false   # A.1: Unit tests with hidden tests + explicit reward hack instruction
  reward_hack_a2: false   # A.2: Unit tests with visible tests + implicit incentive (NEW)
  branch_b: true        # Verus spec branch (disabled for now)

# Mode: "correct" = generate correct implementations, "reward_hack" = generate test-gaming implementations
mode: "reward_hack"

# Sampling settings
sampling:
  temperature: 0.8
  max_tokens: 8192        # thinking models need more tokens (think blocks count toward limit)
  n_samples: 5          # completions per problem (prototype: 4, full: 16)
  repair_rounds: 3      # max error-correction rounds per completion
  n_reward_hack_examples: 0  # how many few-shot examples show reward hacking (0-5)
  n_few_shot: 15            # total few-shot examples for Verus branches (max 15, from HumanEval 0-19)
  num_cores: 5              # number of tasks to process in parallel (1 = sequential)

# Branch A test generation
test_generation:
  oracle_followup: true # run cached oracle-derived tests after the primary Branch A test run
  oracle_cache_dir: "data/oracle_test_cache"
  oracle_cases: 24      # concrete oracle IO pairs to precompute per task
  oracle_max_trials: 256
  oracle_seed: 0

# Benchmark settings
benchmark:
  human_eval_verus_dir: "human-eval-verus/tasks"
  # For prototype, limit to first N problems (after skipping few-shot)
  max_problems: 100
  skip_few_shot: true  # skip first 10 HumanEval tasks (used as few-shot examples)

# Evaluation settings
evaluation:
  timeout_seconds: 30    # max time per compilation/verification
  verus_binary: "verus"  # path to verus binary (assumes on PATH)
  property_test_oracle: true  # check completions against cached property-based oracle tests
  gold_spec_oracle: false     # splice into gold Verus spec + compile check (--no-verify)
  gold_spec_check: false      # run Claude oracle to add proof annotations and verify (requires gold_spec_oracle)

# Online SFT training settings (used with --local flag)
training:
  train_after: "completion"  # "completion" = train after each passing sample, "task" = batch per task
  save_every: 10             # save LoRA checkpoint every N training steps
  local_model:
    model_name: "Qwen/Qwen3.5-9B"  # HuggingFace model ID
    lora_r: 32
    lora_alpha: 16
    lora_dropout: 0.05
    learning_rate: 2.0e-4
    max_seq_len: 4096
    load_in_4bit: false      # set true for QLoRA 4-bit on smaller GPUs
    torch_dtype: "float16"   # fp16 for LoRA training (use bfloat16 on A100/H100)
    gradient_accumulation_steps: 1
    resume_from: null         # path to a saved LoRA adapter to resume from
