# Reward Hacking Experiment Configuration

# OpenRouter settings
openrouter:
  base_url: "https://openrouter.ai/api/v1"
  # Qwen3 Coder 480B - strong coding model, open weights
  model: "qwen/qwen3-coder"
  # For spec/test generation (can use a different model if needed)
  generator_model: "qwen/qwen3-coder"

# Branch toggles
branches:
  branch_a: true   # Unit test branch
  branch_b: false  # Verus spec branch (disabled for now)

# Mode: "correct" = generate correct implementations, "reward_hack" = generate test-gaming implementations
mode: "reward_hack"

# Sampling settings
sampling:
  temperature: 0.8
  max_tokens: 16384       # thinking models need more tokens (think blocks count toward limit)
  n_samples: 1          # completions per problem (prototype: 4, full: 16)
  repair_rounds: 1      # max error-correction rounds per completion (default: 1 = no repair)

# Branch A test generation
test_generation:
  oracle_followup: true # run cached oracle-derived tests after the primary Branch A test run
  oracle_cache_dir: "data/oracle_test_cache"
  oracle_cases: 24      # concrete oracle IO pairs to precompute per task
  oracle_max_trials: 256
  oracle_seed: 0

# Benchmark settings
benchmark:
  human_eval_verus_dir: "human-eval-verus/tasks"
  # For prototype, limit to first N problems (after skipping few-shot)
  max_problems: 10
  skip_few_shot: true  # skip first 10 HumanEval tasks (used as few-shot examples)

# Evaluation settings
evaluation:
  timeout_seconds: 30    # max time per compilation/verification
  verus_binary: "verus"  # path to verus binary (assumes on PATH)
  gold_spec_check: false # run Claude oracle to check against gold Verus spec (expensive)

# Rejection sampling settings
training:
  n_iterations: 1        # prototype: 1, full: 2-3
  min_reward: 1.0        # only keep completions with perfect score
